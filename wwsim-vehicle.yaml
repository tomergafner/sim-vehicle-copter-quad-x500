wwsim_vehicle_version: 2
name: copter-quad-x500
description: 500mm quad, X frame, 4S — wwsim reference copter (Gazebo + cameras).

sim:
  autopilot:
    name: ardupilot
    firmware_ref: Copter-4.6.3
    params:
      base: params/copter_x500.parm
      overlays: []
    gazebo:
      model: gazebo/iris/model.sdf
      spawn:
        pose: "0 0 0.2 0 0 0"

vehicle:
  type: copter
  frame: quad
  mass_kg: 1.6
  arm_length_m: 0.25
  battery:
    cells: 4
    capacity_mah: 5000
    voltage_nominal: 14.8

sensors:
  autopilot_consumed:
    - gps
    - imu
    - barometer
    - magnetometer
    - rangefinder_down
  external_streams:
    - name: onboard-cam
      type: camera
      adapter: gazebo-topic
      config: { topic: camera/onboard, udp_port: 5600 }
    - name: chase-cam
      type: camera
      adapter: gazebo-topic
      config: { topic: camera/chase, udp_port: 5602 }

param_overlays:
  sitl_dev:
    description: SITL-only quality-of-life (motor-spin, disarm delay).
    files: [params/sitl_dev.parm]
    always_apply_on: [sitl]
  indoor_no_gps:
    description: GPS-denied indoor SITL.
    files: [params/sitl_dev.parm, params/no_gps.parm]
  outdoor_gps:
    description: Outdoor + GPS hold.
    files: [params/gps_outdoor.parm]

noise_profiles:
  imu: noise/imu_default.yaml
  gps: noise/gps_urban.yaml

metadata:
  tags: [quad, sub-2kg, reference, gazebo]
